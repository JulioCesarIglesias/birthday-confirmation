<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<title>Presença Confirmada</title>

</head>

<body class="min-h-screen bg-gradient-to-br from-blue-200 to-blue-100 flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden text-center">

<!-- imagem topo -->
<img
src="https://images.unsplash.com/photo-1513151233558-d860c5398176"
class="w-full h-40 object-cover"
/>

<div class="p-8">

<!-- ícone bonito -->
<div class="flex justify-center mb-4">
<div class="bg-green-100 p-4 rounded-full">
<i data-lucide="party-popper" class="w-10 h-10 text-green-600"></i>
</div>
</div>

<h2 class="text-3xl font-bold text-gray-800 mb-3">
Presença Confirmada!
</h2>

<p class="text-gray-600 mb-6">
Muito obrigado por confirmar sua presença.  
Será uma alegria enorme celebrar esse momento com você!
</p>

<p class="text-gray-700 font-medium mb-4">
Estamos ansiosos para comemorar juntos.
</p>

<!-- informações do evento -->
<div class="bg-blue-50 rounded-xl p-4 mb-6 text-sm text-gray-700 space-y-2">

<div class="flex items-center justify-center gap-2">
<i data-lucide="calendar"></i>
<span>14 de Março de 2026</span>
</div>

<div class="flex items-center justify-center gap-2">
<i data-lucide="clock"></i>
<span>19:00</span>
</div>

<div class="flex items-center justify-center gap-2">
<i data-lucide="map-pin"></i>
<span>Espaço Celebration</span>
</div>

</div>

<a href="/">
<button class="bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition w-full flex items-center justify-center gap-2">
<i data-lucide="arrow-left"></i>
Voltar ao início
</button>
</a>

</div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
